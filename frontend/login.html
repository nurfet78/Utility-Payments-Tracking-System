<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Коммунальные платежи</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --color-bg: #0c0e14;
            --color-surface: #161922;
            --color-surface-hover: #1c2030;
            --color-border: #2a2f3e;
            --color-border-focus: #4f7df5;
            --color-accent: #4f7df5;
            --color-accent-hover: #6b93ff;
            --color-accent-glow: rgba(79, 125, 245, 0.25);
            --color-text: #e8ecf4;
            --color-text-muted: #6b7394;
            --color-text-dim: #454d6b;
            --color-error: #f54f5f;
            --color-error-bg: rgba(245, 79, 95, 0.08);
            --font-ui: 'DM Sans', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-ui);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* === Background grid pattern === */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79, 125, 245, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 125, 245, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: 0;
        }

        /* === Ambient glow === */
        body::after {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(79, 125, 245, 0.08) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* === Login container === */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        /* === Top status line === */
        .status-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--color-text-dim);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-accent);
            box-shadow: 0 0 8px var(--color-accent-glow);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* === Card === */
        .login-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.02) inset,
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 80px rgba(79, 125, 245, 0.04);
            animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* === Card header === */
        .login-header {
            padding: 36px 36px 0;
            text-align: center;
        }

        .login-logo {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--color-accent), #7c5bf5);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        .login-logo svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .login-logo::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(79, 125, 245, 0.2), rgba(124, 91, 245, 0.2));
            z-index: -1;
            filter: blur(12px);
        }

        .login-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-bottom: 4px;
        }

        /* === Divider === */
        .divider {
            height: 1px;
            background: var(--color-border);
            margin: 28px 36px 0;
        }

        /* === Form === */
        .login-body {
            padding: 28px 36px 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-family: var(--font-ui);
            font-size: 0.95rem;
            color: var(--color-text);
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: var(--color-text-dim);
        }

        .form-input:focus {
            border-color: var(--color-border-focus);
            box-shadow: 0 0 0 3px var(--color-accent-glow);
            background: var(--color-surface-hover);
        }

        /* === Error message === */
        .login-error {
            display: none;
            padding: 10px 14px;
            background: var(--color-error-bg);
            border: 1px solid rgba(245, 79, 95, 0.15);
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--color-error);
            text-align: center;
            margin-bottom: 20px;
            animation: shake 0.4s ease;
        }

        .login-error.visible {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* === Button === */
        .login-btn {
            width: 100%;
            padding: 13px 24px;
            font-family: var(--font-ui);
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, var(--color-accent), #6366f1);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(79, 125, 245, 0.3);
        }

        .login-btn:hover:not(:disabled)::before {
            opacity: 1;
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(79, 125, 245, 0.2);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* === Spinner === */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* === Footer note === */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--color-text-dim);
            font-family: var(--font-mono);
            letter-spacing: 0.03em;
        }

        /* === Responsive === */
        @media (max-width: 480px) {
            .login-wrapper { padding: 16px; }
            .login-header { padding: 28px 24px 0; }
            .login-body { padding: 24px; }
            .divider { margin: 24px 24px 0; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="status-line">
            <span class="status-dot"></span>
            <span>Utility Payments System v1.0</span>
        </div>

        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <div class="login-title">Коммунальные платежи</div>
                <div class="login-subtitle">Авторизуйтесь для продолжения</div>
            </div>

            <div class="divider"></div>

            <div class="login-body">
                <div id="login-error" class="login-error"></div>

                <div class="form-group">
                    <label class="form-label" for="username">Логин</label>
                    <input type="text" id="username" name="username"
                           class="form-input" placeholder="Введите логин"
                           autocomplete="username" autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <input type="password" id="password" name="password"
                           class="form-input" placeholder="Введите пароль"
                           autocomplete="current-password">
                </div>

                <button id="login-btn" class="login-btn" onclick="handleLogin()">
                    Войти в систему
                </button>
            </div>
        </div>

        <div class="login-footer">
            Защищённый доступ &middot; Spring Security
        </div>
    </div>

    <script>
        // Если уже авторизован — перейти на главную
        fetch('/api/auth/me', { credentials: 'same-origin' })
            .then(r => { if (r.ok) window.location.href = '/index.html'; });

        // Enter для отправки формы
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('username').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        async function handleLogin() {
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorEl.classList.remove('visible');

            if (!username || !password) {
                errorEl.textContent = 'Введите логин и пароль';
                errorEl.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Вход...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password }),
                });

                if (response.ok) {
                    window.location.href = '/index.html';
                } else {
                    const data = await response.json().catch(() => ({}));
                    errorEl.textContent = data.message || 'Неверный логин или пароль';
                    errorEl.classList.add('visible');
                }
            } catch (err) {
                errorEl.textContent = 'Нет соединения с сервером';
                errorEl.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти в систему';
            }
        }
    </script>
</body>
</html>
