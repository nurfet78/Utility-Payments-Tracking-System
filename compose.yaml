services:

  postgres:
    image: 'postgres:18'
    environment:
      - 'POSTGRES_DB=utilpay'
      - 'POSTGRES_PASSWORD=admin'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utilpay"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      SERVER_PORT:                   8080
      SPRING_PROFILES_ACTIVE:        prod
      SPRING_DATASOURCE_URL:         jdbc:postgresql://postgres:5432/utilpay
      SPRING_DATASOURCE_USERNAME:    postgres
      SPRING_DATASOURCE_PASSWORD:    admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED:         "true"
    ports:
      - '8888:8080'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/services || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy
