server:
  port: 8888

spring:
  application:
    name: PaymentsTrackingSystem
  datasource:
    url: jdbc:postgresql://localhost:5432/utilpay
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        highlight_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Авторизация (один пользователь, in-memory)
  app:
    security:
      username: ${APP_SECURITY_USERNAME}
      password: ${APP_SECURITY_PASSWORD}

logging:
  level:
    root: info
