server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # HTML — никогда не кэшировать.
    # Браузер всегда получает свежий HTML с актуальными
    # ссылками на JS/CSS файлы (с хэшами в именах).
    # ----------------------------------------------------------
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # ----------------------------------------------------------
    # JS, CSS — агрессивный кэш с immutable.
    # Имена файлов содержат хэш содержимого (api.a3f7c1b2.js),
    # поэтому при любом изменении кода имя файла меняется,
    # и браузер автоматически скачивает новую версию.
    # ----------------------------------------------------------
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Шрифты, картинки — тоже агрессивный кэш
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ----------------------------------------------------------
    # Статические файлы фронтенда
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------
    # Reverse proxy → Backend API
    # ----------------------------------------------------------
    location /services {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /accounts {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
    }

    location /swagger-ui {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
    }

    # ----------------------------------------------------------
    # Gzip
    # ----------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
